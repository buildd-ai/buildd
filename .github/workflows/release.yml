name: Release

# Delegates to the reusable workflow in buildd-ai/.github so release
# logic stays in one place across the org. Local `bun run release`
# still uses scripts/release.sh in this repo for offline-friendly
# shipping; the two are intended to stay in sync.

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Open the release PR even if no feat/fix commits since last tag'
        required: false
        default: 'false'
  schedule:
    - cron: '0 9 * * *'

jobs:
  release:
    # The reusable workflow pushes a version-bump commit and opens the release
    # PR, so it declares contents:write + pull-requests:write. A called workflow
    # cannot exceed the caller's token permissions, and this repo's default
    # workflow permissions are read-only — without this block the run fails at
    # startup (startup_failure) before any job executes. Grant the same scopes
    # here so they can be passed down.
    permissions:
      contents: write
      pull-requests: write
    uses: buildd-ai/.github/.github/workflows/release.yml@main
    with:
      package_files: 'apps/runner/package.json apps/web/package.json packages/core/package.json packages/shared/package.json'
      force: ${{ inputs.force == 'true' }}
    # Pass the release App private key so the reusable workflow can author the
    # release PR as the App (CI then runs without a manual "approve and run").
    # App id comes from vars.RELEASE_APP_ID (enterprise var); only the secret
    # needs explicit passthrough. Absent ⇒ reusable falls back to github.token.
    secrets:
      RELEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
