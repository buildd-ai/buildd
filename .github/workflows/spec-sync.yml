# DEPRECATED: This workflow builds a spec-drift corpus on an ephemeral Neon branch and
# uploads it as a CI artifact. It is superseded by the knowledge-ingest workflow, which
# ingests code + spec chunks into the unified workspace store ({workspaceId}:code and
# {workspaceId}:spec) that the `spec_compare` MCP tool now reads directly.
# Do not delete until the knowledge-ingest workflow is confirmed in production.
#
# Spec-sync: weekly refresh of the spec-drift evidence.
#
# Builds the spec-sync corpus on a throwaway Neon branch (code + docs from buildd
# and the doc repos), retrieves code-vs-docs evidence per feature, and uploads it
# as an artifact. It does NOT judge — judging is interactive (the `spec_compare`
# admin MCP action, or reading this artifact). No LLM / API key runs here.
#
# Uses the existing NEON_* secrets (ephemeral branch, like build.yml) + VOYAGE_API_KEY.
# No DATABASE_URL secret needed; the branch is created and deleted per run.
#
# NOTE: this ephemeral corpus is for the artifact only — it does NOT refresh the
# production corpus the runtime `spec_compare` tool reads. Refresh prod separately
# (run the ingest locally, or from a deploy hook).
name: spec-sync

on:
  schedule:
    - cron: '0 7 * * 1'        # Mondays 07:00 UTC
  workflow_dispatch: {}

concurrency:
  group: spec-sync
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: read            # lets the built-in token clone org repos via gh
    env:
      VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
      SPEC_WORKSPACE_ID: ${{ vars.SPEC_WORKSPACE_ID || '471effe1-4668-4cc9-9fa3-e20a56769deb' }}
      GH_TOKEN: ${{ github.token }}
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
      NEON_PARENT_BRANCH_ID: ${{ secrets.NEON_PARENT_BRANCH_ID }}
    steps:
      - name: Checkout buildd
        uses: actions/checkout@v4

      - name: Create Neon branch
        id: neon
        run: |
          BRANCH_NAME="ci/spec-sync-${{ github.run_id }}"
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $NEON_API_KEY" -H "Content-Type: application/json" \
            -d "{\"branch\": {\"name\": \"$BRANCH_NAME\", \"parent_id\": \"$NEON_PARENT_BRANCH_ID\"}, \"endpoints\": [{\"type\": \"read_write\"}]}" \
            "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches")
          BRANCH_ID=$(echo "$RESPONSE" | jq -r '.branch.id')
          [ "$BRANCH_ID" = "null" ] || [ -z "$BRANCH_ID" ] && { echo "::error::branch create failed"; echo "$RESPONSE" | jq .; exit 1; }
          URI=$(echo "$RESPONSE" | jq -r '.connection_uris[0].connection_uri // empty')
          [[ "$URI" != *"sslmode=require"* ]] && URI="${URI}?sslmode=require"
          echo "branch_id=$BRANCH_ID" >> "$GITHUB_OUTPUT"
          echo "::add-mask::$URI"
          echo "database_url=$URI" >> "$GITHUB_OUTPUT"

      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Migrate Neon branch
        run: cd packages/core && bun db:migrate
        env:
          DATABASE_URL: ${{ steps.neon.outputs.database_url }}

      - name: Clone doc repos
        run: |
          gh repo clone buildd-ai/buildd-docs ../buildd-docs -- --depth 1 || true
          gh repo clone buildd-ai/buildd-site ../buildd-site -- --depth 1 || true
          gh repo clone buildd-ai/knowledge-base ../knowledge-base -- --depth 1 || true

      - name: Build corpus + emit evidence
        env:
          DATABASE_URL: ${{ steps.neon.outputs.database_url }}
        run: |
          bun packages/core/scripts/reset-knowledge-namespace.ts "$SPEC_WORKSPACE_ID" all
          BUILDD_DIR="$GITHUB_WORKSPACE" \
          BUILDD_DOCS_DIR="$GITHUB_WORKSPACE/../buildd-docs" \
          BUILDD_SITE_DIR="$GITHUB_WORKSPACE/../buildd-site" \
          KNOWLEDGE_BASE_DIR="$GITHUB_WORKSPACE/../knowledge-base" \
          bash .claude/skills/spec-sync/scripts/ingest-spec-corpus.sh
          bun .claude/skills/spec-sync/scripts/spec-drift.ts "$SPEC_WORKSPACE_ID" 5 --evidence > evidence.txt || true

      - name: Upload evidence
        uses: actions/upload-artifact@v4
        with: { name: spec-sync-evidence, path: evidence.txt }

      - name: Cleanup Neon branch
        if: always()
        run: |
          BRANCH_ID="${{ steps.neon.outputs.branch_id }}"
          [ -z "$BRANCH_ID" ] && exit 0
          curl -sf -X DELETE -H "Authorization: Bearer $NEON_API_KEY" \
            "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches/$BRANCH_ID" || true
