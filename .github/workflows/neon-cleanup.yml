name: Cleanup Neon Schema Branches

# Cleans up isolated Neon branches created for schema-change PRs.
# No paths filter — closed PRs don't have diffs to match against.

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Delete Neon branch
        run: |
          set -euo pipefail

          PR_NUM="${{ github.event.pull_request.number }}"

          # Find Neon branch
          BRANCH_ID=""
          for attempt in 1 2 3; do
            RESPONSE=$(curl -sf \
              -H "Authorization: Bearer $NEON_API_KEY" \
              "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches" 2>&1) && break
            echo "::warning::Neon branch list attempt $attempt failed, retrying in $((attempt * 5))s..."
            sleep $((attempt * 5))
          done

          if [ -z "$RESPONSE" ]; then
            echo "::error::Failed to list Neon branches after 3 attempts"
            exit 1
          fi

          # Search for both naming patterns (preview/ from neon-preview, ci/ from build.yml)
          BRANCH_IDS=$(echo "$RESPONSE" | jq -r --arg pr "$PR_NUM" \
            '.branches[] | select(.name == "preview/pr-\($pr)" or .name == "ci/pr-\($pr)") | .id')

          if [ -z "$BRANCH_IDS" ]; then
            echo "No Neon branches for PR #$PR_NUM"
            exit 0
          fi

          # Delete all matching Neon branches
          while IFS= read -r BRANCH_ID; do
            [ -z "$BRANCH_ID" ] && continue
            for attempt in 1 2 3; do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
                -H "Authorization: Bearer $NEON_API_KEY" \
                "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches/$BRANCH_ID")
              if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
                echo "Deleted Neon branch: $BRANCH_ID"
                break
              fi
              echo "::warning::Delete attempt $attempt failed (HTTP $HTTP_CODE), retrying..."
              sleep $((attempt * 5))
            done
          done <<< "$BRANCH_IDS"
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}

