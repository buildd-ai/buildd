name: Tag Release

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  tag:
    if: >-
      github.event.pull_request.merged == true &&
      (startsWith(github.event.pull_request.title, 'Release v') ||
       startsWith(github.event.pull_request.title, 'Hotfix v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Extract version and tag
        id: version
        run: |
          VERSION=$(echo "${{ github.event.pull_request.title }}" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+')
          echo "Tagging ${VERSION}"
          git tag "$VERSION"
          git push origin "$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Get the previous tag to generate changelog
          PREV_TAG=$(git tag --sort=-v:refname --list 'v*' | grep -v "^${VERSION}$" | head -1)

          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..${VERSION}" --format='- %s' --no-merges | grep -v 'chore: bump version')
          else
            NOTES="Initial release"
          fi

          if [ -z "$NOTES" ]; then
            NOTES="See [PR #${PR_NUMBER}](https://github.com/${{ github.repository }}/pull/${PR_NUMBER}) for details."
          fi

          gh release create "$VERSION" --title "$VERSION" --notes "$NOTES"
