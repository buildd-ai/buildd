name: Set Vercel Env Var (one-off)

on:
  workflow_dispatch:
    inputs:
      env_key:
        description: 'Environment variable name'
        required: true
        default: 'BUILDD_SIGNING_KEY_TEAM_ID'
      env_value:
        description: 'Environment variable value'
        required: true
        default: 'd2cb1c29-3f92-4ea1-ba0c-fe8b41ccf3b5'

jobs:
  set-env:
    runs-on: ubuntu-latest
    steps:
      - name: Add or update Vercel env var
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          KEY="${{ github.event.inputs.env_key }}"
          VALUE="${{ github.event.inputs.env_value }}"

          echo "Setting $KEY = $VALUE"

          # Delete any existing entries for this key
          EXISTING_DATA=$(curl -sf \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env?teamId=$VERCEL_ORG_ID&keys=$KEY" || echo '{"envs":[]}')

          echo "Existing: $EXISTING_DATA"

          echo "$EXISTING_DATA" | jq -r '.envs[].id' | while read ID; do
            echo "Deleting $ID..."
            curl -sf -X DELETE \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env/$ID?teamId=$VERCEL_ORG_ID" || true
          done

          # Build JSON payload with jq and POST to Vercel
          PAYLOAD=$(jq -n \
            --arg k "$KEY" \
            --arg v "$VALUE" \
            '[{"key":$k,"value":$v,"type":"plain","target":["production","preview","development"]}]')

          echo "Payload: $PAYLOAD"

          HTTP_CODE=$(echo "$PAYLOAD" | curl -s -o /tmp/vercel_response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d @- \
            "https://api.vercel.com/v10/projects/$VERCEL_PROJECT_ID/env?teamId=$VERCEL_ORG_ID")

          BODY=$(cat /tmp/vercel_response.json)
          echo "Response ($HTTP_CODE): $BODY"

          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "ERROR: Failed to set env var (HTTP $HTTP_CODE)"
            exit 1
          fi

          echo "Successfully set $KEY"
