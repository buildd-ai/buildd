name: Set Vercel Env Var (one-off)

on:
  workflow_dispatch:
    inputs:
      env_key:
        description: 'Environment variable name'
        required: true
        default: 'BUILDD_SIGNING_KEY_TEAM_ID'
      env_value:
        description: 'Environment variable value'
        required: true
        default: 'd2cb1c29-3f92-4ea1-ba0c-fe8b41ccf3b5'
      redeploy:
        description: 'Trigger redeploy after setting env var'
        required: false
        default: 'true'

jobs:
  set-env:
    runs-on: ubuntu-latest
    steps:
      - name: Set Vercel env var via CLI
        env:
          VERCEL_TOKEN_RAW: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          KEY="${{ github.event.inputs.env_key }}"
          VALUE="${{ github.event.inputs.env_value }}"

          # Strip any newlines the secret may contain
          VERCEL_TOKEN=$(printf '%s' "$VERCEL_TOKEN_RAW" | tr -d '\n\r')
          export VERCEL_TOKEN

          echo "Installing Vercel CLI..."
          npm install -g vercel@latest --silent

          # Create a linked project directory
          mkdir -p /tmp/vp/.vercel
          printf '{"projectId":"%s","orgId":"%s"}' "$VERCEL_PROJECT_ID" "$VERCEL_ORG_ID" \
            > /tmp/vp/.vercel/project.json
          cd /tmp/vp

          # Remove existing entries (ignore errors if not found)
          vercel env rm "$KEY" production   --token "$VERCEL_TOKEN" --yes 2>&1 || true
          vercel env rm "$KEY" preview      --token "$VERCEL_TOKEN" --yes 2>&1 || true
          vercel env rm "$KEY" development  --token "$VERCEL_TOKEN" --yes 2>&1 || true

          # Add for each environment
          echo "Adding $KEY for production..."
          printf '%s' "$VALUE" | vercel env add "$KEY" production   --token "$VERCEL_TOKEN" --yes
          echo "Adding $KEY for preview..."
          printf '%s' "$VALUE" | vercel env add "$KEY" preview      --token "$VERCEL_TOKEN" --yes
          echo "Adding $KEY for development..."
          printf '%s' "$VALUE" | vercel env add "$KEY" development  --token "$VERCEL_TOKEN" --yes

          echo "Done! $KEY set for production, preview, and development."

      - name: Deploy from main branch
        if: ${{ github.event.inputs.redeploy == 'true' }}
        env:
          VERCEL_TOKEN_RAW: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          GH_TOKEN: ${{ github.token }}
        run: |
          VERCEL_TOKEN=$(printf '%s' "$VERCEL_TOKEN_RAW" | tr -d '\n\r')

          # Get main branch SHA
          SHA=$(curl -sf \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/git/ref/heads/main" \
            | jq -r '.object.sha // empty')
          echo "Main branch SHA: $SHA"

          if [ -z "$SHA" ]; then
            echo "Could not get main branch SHA, skipping deploy"
            exit 0
          fi

          # Get GitHub repo ID
          REPO_ID=$(curl -sf \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}" \
            | jq -r '.id // empty')
          echo "GitHub repo ID: $REPO_ID"

          # Create a new Vercel deployment from main — env vars set above are
          # baked into this build, so BUILDD_SIGNING_KEY_TEAM_ID will be present.
          echo "Creating new production deployment from main ($SHA)..."
          RESULT=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"buildd\",\"target\":\"production\",\"gitSource\":{\"type\":\"github\",\"repoId\":\"$REPO_ID\",\"ref\":\"main\",\"sha\":\"$SHA\"}}" \
            "https://api.vercel.com/v13/deployments?teamId=$VERCEL_ORG_ID")

          HTTP=$(echo "$RESULT" | tail -1)
          BODY=$(echo "$RESULT" | head -n -1)
          echo "Deploy response ($HTTP):"
          echo "$BODY" | jq -r '{id:.id, url:.url, state:.readyState, error:.error.message} // "unexpected format"' 2>/dev/null || echo "$BODY"

          if [ "$HTTP" = "200" ] || [ "$HTTP" = "201" ]; then
            echo "Deployment created successfully."
          else
            echo "WARNING: Deploy API returned HTTP $HTTP — may need manual redeploy in Vercel dashboard."
          fi

      - name: Verify JWKS endpoint
        if: ${{ github.event.inputs.redeploy == 'true' }}
        run: |
          echo "Waiting 90s for deployment to complete..."
          sleep 90

          # The JWKS endpoint auto-bootstraps the first signing key when BUILDD_SIGNING_KEY_TEAM_ID is set.
          echo "Verifying JWKS endpoint..."
          JWKS=$(curl -s "https://buildd.dev/api/.well-known/jwks.json")
          echo "JWKS: $JWKS"

          KEY_COUNT=$(echo "$JWKS" | jq '.keys | length' 2>/dev/null || echo "0")
          echo "Key count: $KEY_COUNT"

          if [ "$KEY_COUNT" -gt "0" ]; then
            echo "JWKS endpoint is working correctly!"
          else
            echo "WARNING: JWKS endpoint returned no keys (deployment may still be in progress)."
            echo "Re-check: curl https://buildd.dev/api/.well-known/jwks.json"
          fi
