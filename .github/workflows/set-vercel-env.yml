name: Set Vercel Env Var (one-off)

on:
  workflow_dispatch:
    inputs:
      env_key:
        description: 'Environment variable name'
        required: true
        default: 'BUILDD_SIGNING_KEY_TEAM_ID'
      env_value:
        description: 'Environment variable value'
        required: true
        default: 'd2cb1c29-3f92-4ea1-ba0c-fe8b41ccf3b5'

jobs:
  set-env:
    runs-on: ubuntu-latest
    steps:
      - name: Add or update Vercel env var via API
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          ENV_KEY: ${{ github.event.inputs.env_key }}
          ENV_VALUE: ${{ github.event.inputs.env_value }}
        run: |
          echo "Setting $ENV_KEY in Vercel..."

          # Fetch existing env vars for this key
          FETCH_STATUS=$(curl -s -o /tmp/existing.json -w "%{http_code}" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_ID}/env?teamId=${VERCEL_ORG_ID}&keys=${ENV_KEY}")

          echo "Fetch existing status: $FETCH_STATUS"

          # Delete each existing entry for this key
          EXISTING_IDS=$(python3 -c "
import json, sys
try:
    data = json.load(open('/tmp/existing.json'))
    for e in data.get('envs', []):
        print(e['id'])
except Exception as e:
    sys.stderr.write(str(e) + '\n')
" 2>&1)

          for ID in $EXISTING_IDS; do
            echo "Deleting existing entry $ID..."
            curl -s -o /dev/null -X DELETE \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_ID}/env/${ID}?teamId=${VERCEL_ORG_ID}"
          done

          # Build JSON payload and create env var
          PAYLOAD=$(python3 -c "import json, os; print(json.dumps({'key': os.environ['ENV_KEY'], 'value': os.environ['ENV_VALUE'], 'type': 'plain', 'target': ['production', 'preview', 'development']}))")

          CREATE_STATUS=$(curl -s -o /tmp/create_resp.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}/env?teamId=${VERCEL_ORG_ID}")

          echo "Create status: $CREATE_STATUS"

          python3 -c "
import json
try:
    d = json.load(open('/tmp/create_resp.json'))
    safe = {k: d[k] for k in ['key','type','target','id','error','message'] if k in d}
    print(json.dumps(safe, indent=2))
except Exception as e:
    print(e)
"

          if [ "$CREATE_STATUS" != "200" ] && [ "$CREATE_STATUS" != "201" ]; then
            echo "ERROR: Vercel API returned HTTP $CREATE_STATUS"
            exit 1
          fi

          echo "Successfully set $ENV_KEY in Vercel."
