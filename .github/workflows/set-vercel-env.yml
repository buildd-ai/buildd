name: Set Vercel Env Var (one-off)

on:
  workflow_dispatch:
    inputs:
      env_key:
        description: 'Environment variable name'
        required: true
        default: 'BUILDD_SIGNING_KEY_TEAM_ID'
      env_value:
        description: 'Environment variable value'
        required: true
        default: 'd2cb1c29-3f92-4ea1-ba0c-fe8b41ccf3b5'

jobs:
  set-env:
    runs-on: ubuntu-latest
    steps:
      - name: Verify Vercel token and project
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          echo "Checking token validity..."
          USER_RESP=$(curl -sf -H "Authorization: Bearer $VERCEL_TOKEN" "https://api.vercel.com/v2/user" || echo "FAILED")
          if echo "$USER_RESP" | grep -q '"user"'; then
            echo "Token valid"
          else
            echo "Token check failed: $USER_RESP"
          fi

          echo "Checking project existence..."
          PROJ_RESP=$(curl -s \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID?teamId=$VERCEL_ORG_ID")
          echo "Project response: $(echo "$PROJ_RESP" | jq -r '.name // .error.message // "unknown"')"

      - name: Add or update Vercel env var
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          KEY="${{ github.event.inputs.env_key }}"
          VALUE="${{ github.event.inputs.env_value }}"

          echo "Setting $KEY"

          # Delete any existing entries for this key
          EXISTING_DATA=$(curl -s \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env?teamId=$VERCEL_ORG_ID&keys=$KEY")

          echo "Existing: $(echo "$EXISTING_DATA" | jq '.envs | length') entries"

          echo "$EXISTING_DATA" | jq -r '.envs[].id // empty' | while read ID; do
            echo "Deleting $ID"
            curl -sf -X DELETE \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env/$ID?teamId=$VERCEL_ORG_ID" || true
          done

          # Try single-object POST (no array wrapper)
          echo "Attempting single-object POST..."
          PAYLOAD=$(jq -cn --arg k "$KEY" --arg v "$VALUE" \
            '{"key":$k,"value":$v,"type":"plain","target":["production","preview","development"]}')

          echo "Payload length: ${#PAYLOAD}"

          HTTP=$(printf '%s' "$PAYLOAD" | curl -s -o /tmp/resp1.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary @- \
            "https://api.vercel.com/v10/projects/$VERCEL_PROJECT_ID/env?teamId=$VERCEL_ORG_ID")
          echo "Single-object response ($HTTP): $(cat /tmp/resp1.json)"

          if [ "$HTTP" = "200" ] || [ "$HTTP" = "201" ]; then
            echo "Successfully set $KEY (single-object)"
            exit 0
          fi

          # Try array POST
          echo "Attempting array POST..."
          PAYLOAD2=$(jq -cn --arg k "$KEY" --arg v "$VALUE" \
            '[{"key":$k,"value":$v,"type":"plain","target":["production","preview","development"]}]')

          HTTP2=$(printf '%s' "$PAYLOAD2" | curl -s -o /tmp/resp2.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary @- \
            "https://api.vercel.com/v10/projects/$VERCEL_PROJECT_ID/env?teamId=$VERCEL_ORG_ID")
          echo "Array response ($HTTP2): $(cat /tmp/resp2.json)"

          if [ "$HTTP2" = "200" ] || [ "$HTTP2" = "201" ]; then
            echo "Successfully set $KEY (array)"
            exit 0
          fi

          echo "ERROR: Both formats failed"
          exit 1
