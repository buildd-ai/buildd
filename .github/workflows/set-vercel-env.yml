name: Set Vercel Env Var (one-off)

on:
  workflow_dispatch:
    inputs:
      env_key:
        description: 'Env var name'
        required: true
        default: 'BUILDD_SIGNING_KEY_TEAM_ID'
      env_value:
        description: 'Env var value'
        required: true
        default: 'd2cb1c29-3f92-4ea1-ba0c-fe8b41ccf3b5'

jobs:
  set-env:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
    steps:
      - name: Set env var via Vercel API
        run: |
          KEY="${{ github.event.inputs.env_key }}"
          VALUE="${{ github.event.inputs.env_value }}"
          echo "Setting $KEY..."

          # Delete existing entries for this key
          curl -s \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_ID}/env?teamId=${VERCEL_ORG_ID}&keys=${KEY}" \
            -o /tmp/existing.json

          python3 << 'EOF'
import json
try:
    data = json.load(open('/tmp/existing.json'))
    ids = [e['id'] for e in data.get('envs', [])]
    print(f"Found {len(ids)} existing entries to delete: {ids}")
    open('/tmp/existing_ids.txt', 'w').write('\n'.join(ids))
except Exception as e:
    print(f"No existing entries (or error): {e}")
    open('/tmp/existing_ids.txt', 'w').write('')
EOF

          while IFS= read -r ID; do
            [ -z "$ID" ] && continue
            echo "Deleting $ID..."
            curl -s -o /dev/null -X DELETE \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_ID}/env/${ID}?teamId=${VERCEL_ORG_ID}"
          done < /tmp/existing_ids.txt

          # Create the env var
          STATUS=$(curl -s -o /tmp/resp.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"$KEY\",\"value\":\"$VALUE\",\"type\":\"plain\",\"target\":[\"production\",\"preview\",\"development\"]}" \
            "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}/env?teamId=${VERCEL_ORG_ID}")

          echo "Status: $STATUS"
          python3 -c "import json; d=json.load(open('/tmp/resp.json')); print({k:d[k] for k in ['key','type','target','id','error','message'] if k in d})"

          [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ] || { echo "FAILED: HTTP $STATUS"; exit 1; }
          echo "Done: $KEY set successfully."
