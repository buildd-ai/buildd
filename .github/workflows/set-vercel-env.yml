name: Set Vercel Env Var (one-off)

on:
  workflow_dispatch:
    inputs:
      env_key:
        description: 'Environment variable name'
        required: true
        default: 'BUILDD_SIGNING_KEY_TEAM_ID'
      env_value:
        description: 'Environment variable value'
        required: true
        default: 'd2cb1c29-3f92-4ea1-ba0c-fe8b41ccf3b5'
      redeploy:
        description: 'Trigger redeploy after setting env var'
        required: false
        default: 'true'

jobs:
  set-env:
    runs-on: ubuntu-latest
    steps:
      - name: Set Vercel env var via CLI
        env:
          VERCEL_TOKEN_RAW: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          KEY="${{ github.event.inputs.env_key }}"
          VALUE="${{ github.event.inputs.env_value }}"

          # Strip any newlines the secret may contain
          VERCEL_TOKEN=$(printf '%s' "$VERCEL_TOKEN_RAW" | tr -d '\n\r')
          export VERCEL_TOKEN

          echo "Installing Vercel CLI..."
          npm install -g vercel@latest --silent

          # Create a linked project directory
          mkdir -p /tmp/vp/.vercel
          printf '{"projectId":"%s","orgId":"%s"}' "$VERCEL_PROJECT_ID" "$VERCEL_ORG_ID" \
            > /tmp/vp/.vercel/project.json
          cd /tmp/vp

          # Remove existing entries (ignore errors if not found)
          vercel env rm "$KEY" production   --token "$VERCEL_TOKEN" --yes 2>&1 || true
          vercel env rm "$KEY" preview      --token "$VERCEL_TOKEN" --yes 2>&1 || true
          vercel env rm "$KEY" development  --token "$VERCEL_TOKEN" --yes 2>&1 || true

          # Add for each environment
          echo "Adding $KEY for production..."
          printf '%s' "$VALUE" | vercel env add "$KEY" production   --token "$VERCEL_TOKEN" --yes
          echo "Adding $KEY for preview..."
          printf '%s' "$VALUE" | vercel env add "$KEY" preview      --token "$VERCEL_TOKEN" --yes
          echo "Adding $KEY for development..."
          printf '%s' "$VALUE" | vercel env add "$KEY" development  --token "$VERCEL_TOKEN" --yes

          echo "Done! $KEY set for production, preview, and development."

      - name: Redeploy production
        if: ${{ github.event.inputs.redeploy == 'true' }}
        env:
          VERCEL_TOKEN_RAW: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERCEL_TOKEN=$(printf '%s' "$VERCEL_TOKEN_RAW" | tr -d '\n\r')

          # Get the current HEAD SHA on main
          MAIN_SHA=$(curl -sf \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/buildd-ai/buildd/git/refs/heads/main" \
            | jq -r '.object.sha')
          echo "main SHA: $MAIN_SHA"

          # Trigger a new production deployment from main via Vercel API.
          # A fresh deployment will pick up the env var we just set.
          echo "Triggering Vercel deployment from main..."
          DEPLOY_RESP=$(curl -sf -X POST \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"buildd\",
              \"target\": \"production\",
              \"gitSource\": {
                \"type\": \"github\",
                \"org\": \"buildd-ai\",
                \"repo\": \"buildd\",
                \"ref\": \"main\",
                \"sha\": \"$MAIN_SHA\"
              }
            }" \
            "https://api.vercel.com/v13/deployments?teamId=$VERCEL_ORG_ID&forceNew=1")

          DEPLOY_ID=$(echo "$DEPLOY_RESP" | jq -r '.id // empty')
          DEPLOY_URL=$(echo "$DEPLOY_RESP" | jq -r '.url // empty')
          echo "Deployment ID: $DEPLOY_ID"
          echo "Deployment URL: $DEPLOY_URL"

          if [ -z "$DEPLOY_ID" ]; then
            echo "Deployment response:"
            echo "$DEPLOY_RESP" | jq '{id, url, error, readyState}' 2>/dev/null || echo "$DEPLOY_RESP"
            echo "Failed to create deployment — env var is set; it will take effect on the next regular deploy."
            exit 0
          fi

          echo "Deployment triggered! Waiting for it to become ready..."

      - name: Verify JWKS endpoint
        if: ${{ github.event.inputs.redeploy == 'true' }}
        run: |
          echo "Waiting 90s for deployment to become active..."
          sleep 90

          echo "Verifying JWKS endpoint (auto-bootstraps signing key on first call)..."
          for i in 1 2 3; do
            JWKS=$(curl -s "https://buildd.dev/api/.well-known/jwks.json")
            KEY_COUNT=$(echo "$JWKS" | jq '.keys | length' 2>/dev/null || echo "0")
            echo "Attempt $i - key count: $KEY_COUNT - response: $JWKS"
            if [ "$KEY_COUNT" -gt "0" ]; then
              echo "JWKS endpoint is working correctly!"
              exit 0
            fi
            sleep 30
          done
          echo "WARNING: JWKS endpoint did not return keys after 3 attempts."
          echo "The env var is set; the signing key will be auto-created on the next request to the JWKS endpoint."
