name: Set Vercel Env Var (one-off)

on:
  workflow_dispatch:
    inputs:
      env_key:
        description: 'Environment variable name'
        required: true
        default: 'BUILDD_SIGNING_KEY_TEAM_ID'
      env_value:
        description: 'Environment variable value'
        required: true
        default: 'd2cb1c29-3f92-4ea1-ba0c-fe8b41ccf3b5'

jobs:
  set-env:
    runs-on: ubuntu-latest
    steps:
      - name: Add or update Vercel env var via API
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          KEY="${{ github.event.inputs.env_key }}"
          VALUE="${{ github.event.inputs.env_value }}"

          echo "Setting $KEY in Vercel..."

          # Fetch existing env vars for this key
          STATUS=$(curl -s -o /tmp/existing.json -w "%{http_code}" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_ID}/env?teamId=${VERCEL_ORG_ID}&keys=${KEY}")

          echo "Fetch existing status: $STATUS"

          # Delete each existing entry for this key
          if command -v jq &>/dev/null; then
            IDS=$(jq -r '.envs[].id // empty' /tmp/existing.json 2>/dev/null || true)
          else
            IDS=$(python3 -c "
          import json, sys
          try:
              data = json.load(open('/tmp/existing.json'))
              for e in data.get('envs', []):
                  print(e['id'])
          except: pass
          " 2>/dev/null || true)
          fi

          for ID in $IDS; do
            echo "Deleting existing entry $ID..."
            DEL_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_ID}/env/${ID}?teamId=${VERCEL_ORG_ID}")
            echo "Delete status: $DEL_STATUS"
          done

          # Create new env var for all environments
          PAYLOAD=$(python3 - <<'PYEOF'
          import json, os
          data = {
            "key": os.environ["KEY"],
            "value": os.environ["VALUE"],
            "type": "plain",
            "target": ["production", "preview", "development"]
          }
          print(json.dumps(data))
          PYEOF
          )

          CREATE_STATUS=$(curl -s -o /tmp/create_resp.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}/env?teamId=${VERCEL_ORG_ID}")

          echo "Create status: $CREATE_STATUS"

          # Show non-sensitive parts of the response
          if command -v jq &>/dev/null; then
            jq '{key, type, target, id}' /tmp/create_resp.json 2>/dev/null || cat /tmp/create_resp.json
          else
            python3 -c "
          import json
          try:
              d = json.load(open('/tmp/create_resp.json'))
              print(json.dumps({k: d[k] for k in ['key','type','target','id','error','message'] if k in d}, indent=2))
          except Exception as e:
              print(e)
          " 2>/dev/null || cat /tmp/create_resp.json
          fi

          if [ "$CREATE_STATUS" != "200" ] && [ "$CREATE_STATUS" != "201" ]; then
            echo "ERROR: Vercel API returned HTTP $CREATE_STATUS"
            exit 1
          fi

          echo "Successfully set $KEY in Vercel."
