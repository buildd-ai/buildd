name: Build & Test

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install

      - name: Check migrations are up to date
        run: |
          cd packages/core
          bun db:generate
          if [ -n "$(git status --porcelain drizzle/)" ]; then
            echo "::error::Schema changes detected but migrations not committed!"
            echo "Run 'cd packages/core && bun db:generate' and commit the generated files."
            git status drizzle/
            git diff drizzle/
            exit 1
          fi
          echo "Migrations are up to date"

      - name: Type check
        run: cd apps/web && bunx tsc --noEmit

      - name: Detect affected tests
        id: affected
        run: |
          AFFECTED=$(bash scripts/affected-tests.sh)
          echo "tests=$AFFECTED" >> "$GITHUB_OUTPUT"

      - name: Run tests
        if: steps.affected.outputs.tests != 'SKIP'
        timeout-minutes: 5
        run: |
          TESTS="${{ steps.affected.outputs.tests }}"
          if [ "$TESTS" = "ALL" ]; then
            echo "Running web tests..."
            bun test --only-failures apps/web/src
            echo "Running runner tests..."
            # Some tests hang due to Bun mock.module + SDK import interaction;
            # run files individually with per-file timeout to avoid blocking CI
            RUNNER_FAIL=0
            for f in apps/runner/__tests__/unit/*.test.ts; do
              timeout 15 bun test --timeout 10000 "$f" 2>&1 || {
                rc=$?
                if [ $rc -eq 124 ]; then
                  echo "::warning::$f timed out (likely hung mock.module) — skipping"
                else
                  RUNNER_FAIL=1
                fi
              }
            done
            [ $RUNNER_FAIL -eq 1 ] && exit 1
          else
            echo "Running affected tests: $TESTS"
            bun test --only-failures $TESTS
          fi

      - name: Build
        run: cd apps/web && bun run build:only
        env:
          # Dummy values for build (not connecting to real DB)
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          AUTH_SECRET: "dummy-secret-for-build"

  # Detect which areas changed to skip expensive integration/E2E when unnecessary
  changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    outputs:
      api: ${{ steps.filter.outputs.api }}
      runner: ${{ steps.filter.outputs.runner }}
      needs_server: ${{ steps.filter.outputs.needs_server }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        run: |
          CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")
          echo "Changed files:"
          echo "$CHANGED"

          # API/server changes — triggers integration tests
          API=$(echo "$CHANGED" | grep -qE '^(apps/web/src/|packages/core/|packages/shared/)' && echo "true" || echo "false")

          # Runner changes — triggers E2E tests
          RUNNER=$(echo "$CHANGED" | grep -qE '^(apps/runner/)' && echo "true" || echo "false")

          # Either requires the server infrastructure
          NEEDS_SERVER=$( [[ "$API" == "true" || "$RUNNER" == "true" ]] && echo "true" || echo "false" )

          echo "api=$API" >> "$GITHUB_OUTPUT"
          echo "runner=$RUNNER" >> "$GITHUB_OUTPUT"
          echo "needs_server=$NEEDS_SERVER" >> "$GITHUB_OUTPUT"

          echo "::notice::api=$API runner=$RUNNER needs_server=$NEEDS_SERVER"

  # Shared infrastructure: Neon branch + Tailscale + preview server + runner
  # Only spins up when API or runner code changed
  integration:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.needs_server == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install

      - name: Create Neon preview branch
        id: neon
        run: |
          BRANCH_NAME="ci/pr-${{ github.event.pull_request.number }}"

          # Check if branch already exists
          EXISTING=$(curl -sf \
            -H "Authorization: Bearer $NEON_API_KEY" \
            "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches" \
            | jq -r --arg name "$BRANCH_NAME" '.branches[] | select(.name == $name) | .id')

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "Deleting stale Neon branch: $EXISTING"
            curl -sf -X DELETE \
              -H "Authorization: Bearer $NEON_API_KEY" \
              "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches/$EXISTING" || true
            sleep 2
          fi

          echo "Creating Neon branch: $BRANCH_NAME"
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $NEON_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"branch\": {\"name\": \"$BRANCH_NAME\", \"parent_id\": \"$NEON_PARENT_BRANCH_ID\"}, \"endpoints\": [{\"type\": \"read_write\"}]}" \
            "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches")
          BRANCH_ID=$(echo "$RESPONSE" | jq -r '.branch.id')
          if [ "$BRANCH_ID" = "null" ] || [ -z "$BRANCH_ID" ]; then
            echo "::error::Failed to create Neon branch"
            echo "$RESPONSE" | jq .
            exit 1
          fi

          # Extract connection URI directly from the API response — avoids static
          # password secrets that may not match the new branch endpoint immediately.
          CONNECTION_URI=$(echo "$RESPONSE" | jq -r '.connection_uris[0].connection_uri // empty')

          if [ -z "$CONNECTION_URI" ]; then
            echo "::warning::connection_uris not in branch response, fetching connection string via endpoint API"
            ENDPOINT_ID=$(echo "$RESPONSE" | jq -r '.endpoints[0].id // empty')
            if [ -n "$ENDPOINT_ID" ]; then
              # Get connection URI from the endpoint's connection_uri API
              CONN_RESPONSE=$(curl -sf \
                -H "Authorization: Bearer $NEON_API_KEY" \
                "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/connection_uri?branch_id=$BRANCH_ID&endpoint_id=$ENDPOINT_ID&database_name=neondb")
              CONNECTION_URI=$(echo "$CONN_RESPONSE" | jq -r '.uri // empty')
            fi
          fi

          if [ -z "$CONNECTION_URI" ]; then
            echo "::warning::Could not extract connection URI from API, falling back to manual construction"
            ENDPOINTS=$(curl -sf \
              -H "Authorization: Bearer $NEON_API_KEY" \
              "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches/$BRANCH_ID/endpoints")
            HOST=$(echo "$ENDPOINTS" | jq -r '.endpoints[0].host')
            CONNECTION_URI="postgresql://${NEON_DB_USER}:${NEON_DB_PASSWORD}@${HOST}/neondb?sslmode=require"
          fi

          # Ensure sslmode=require is present
          if [[ "$CONNECTION_URI" != *"sslmode=require"* ]]; then
            if [[ "$CONNECTION_URI" == *"?"* ]]; then
              CONNECTION_URI="${CONNECTION_URI}&sslmode=require"
            else
              CONNECTION_URI="${CONNECTION_URI}?sslmode=require"
            fi
          fi

          echo "branch_id=$BRANCH_ID" >> "$GITHUB_OUTPUT"
          echo "database_url=$CONNECTION_URI" >> "$GITHUB_OUTPUT"
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          NEON_PARENT_BRANCH_ID: ${{ secrets.NEON_PARENT_BRANCH_ID }}
          NEON_DB_USER: ${{ secrets.NEON_DB_USER }}
          NEON_DB_PASSWORD: ${{ secrets.NEON_DB_PASSWORD }}

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Sync code and build on test machine
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          tailscale ssh ubuntu@100.82.109.19 << SCRIPT
            docker exec coder-ai-run-my-claude-workspace bash -c "
              set -e
              export PATH=/home/coder/.local/bin:/home/coder/.bun/bin:\\\$PATH
              (chmod -R u+rwx /tmp/buildd-ci 2>/dev/null || true) && rm -rf /tmp/buildd-ci
              git clone --depth 1 --branch $BRANCH https://github.com/${{ github.repository }}.git /tmp/buildd-ci
              cd /tmp/buildd-ci && bun install 2>&1 | tail -3
              cd apps/web && DATABASE_URL=postgresql://x:x@localhost/x AUTH_SECRET=build-secret bun run build:only 2>&1 | tail -50
              test -d .next || { echo 'Build failed: .next directory missing'; exit 1; }
            "
          SCRIPT

      - name: Run migrations on Neon preview branch
        run: cd packages/core && bun db:migrate
        env:
          DATABASE_URL: ${{ steps.neon.outputs.database_url }}

      - name: Raise concurrency limits for CI
        run: |
          psql "$DATABASE_URL" <<'SQL'
            UPDATE accounts SET max_concurrent_workers = 50;
            UPDATE runner_instances SET max_concurrent_workers = 50;
          SQL
        env:
          DATABASE_URL: ${{ steps.neon.outputs.database_url }}

      - name: Start preview server
        run: |
          # Pipe env vars to a file on the remote — avoids all escaping issues
          printf 'DATABASE_URL=%s\nAUTH_SECRET=%s\n' "$DATABASE_URL" "$AUTH_SECRET" | \
            tailscale ssh ubuntu@100.82.109.19 \
              "docker exec -i coder-ai-run-my-claude-workspace bash -c 'cat > /tmp/buildd-ci/.env.test'"

          # Start Next.js server with real env vars
          tailscale ssh ubuntu@100.82.109.19 << 'SCRIPT'
            docker exec coder-ai-run-my-claude-workspace bash -c '
              export PATH=$HOME/.local/bin:$HOME/.bun/bin:$PATH
              screen -X -S buildd-web quit 2>/dev/null || true
              screen -dmS buildd-web bash -c "
                export PATH=\$HOME/.local/bin:\$HOME/.bun/bin:\$PATH
                set -a; source /tmp/buildd-ci/.env.test; set +a
                export PORT=3333
                cd /tmp/buildd-ci/apps/web && bun run start >> /tmp/buildd-web.log 2>&1
              "
            '
          SCRIPT

          # Wait for server
          for i in $(seq 1 30); do
            if curl -s http://100.82.109.19:3333/api/version 2>/dev/null | jq -e . >/dev/null 2>&1; then
              echo "Server ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Preview server failed to start after 150s"
              echo "--- /tmp/buildd-web.log ---"
              tailscale ssh ubuntu@100.82.109.19 \
                "docker exec coder-ai-run-my-claude-workspace cat /tmp/buildd-web.log 2>/dev/null" || true
              exit 1
            fi
            echo "Waiting for server... (attempt $i)"
            sleep 5
          done
        env:
          DATABASE_URL: ${{ steps.neon.outputs.database_url }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}

      - name: Start preview runner
        if: needs.changes.outputs.runner == 'true'
        run: |
          tailscale ssh ubuntu@100.82.109.19 << SCRIPT
            docker exec coder-ai-run-my-claude-workspace bash -c "
              export PATH=\\\$HOME/.local/bin:\\\$HOME/.bun/bin:\\\$PATH
              screen -X -S buildd-test quit 2>/dev/null || true
              screen -dmS buildd-test bash -c '
                export PATH=\\\$HOME/.local/bin:\\\$HOME/.bun/bin:\\\$PATH
                export PORT=8767
                export BUILDD_API_KEY=$BUILDD_API_KEY
                export BUILDD_SERVER=http://localhost:3333
                cd /tmp/buildd-ci && bun run apps/runner/src/index.ts >> /tmp/buildd-test.log 2>&1
              '
            "
          SCRIPT
          sleep 5
        env:
          BUILDD_API_KEY: ${{ secrets.BUILDD_API_KEY }}

      - name: Integration tests
        if: needs.changes.outputs.api == 'true'
        run: |
          bun test apps/web/tests/integration/concurrency.test.ts \
               apps/web/tests/integration/worker-state-machine.test.ts \
               apps/web/tests/integration/schedule-triggers.test.ts \
               apps/web/tests/integration/artifacts.test.ts \
               apps/web/tests/integration/recipes.test.ts \
               apps/web/tests/integration/missions-smoke.test.ts \
               apps/runner/__tests__/integration-config.test.ts
        env:
          BUILDD_TEST_SERVER: http://100.82.109.19:3333
          BUILDD_API_KEY: ${{ secrets.BUILDD_API_KEY }}
          BUILDD_ADMIN_API_KEY: ${{ secrets.BUILDD_ADMIN_API_KEY }}
          LOCAL_UI_URL: http://100.82.109.19:8767

      - name: E2E tests
        run: bun test tests/e2e/server-worker-flow.test.ts
        timeout-minutes: 10
        env:
          BUILDD_TEST_SERVER: http://100.82.109.19:3333
          BUILDD_RUNNER_SERVER: http://localhost:3333
          BUILDD_API_KEY: ${{ secrets.BUILDD_API_KEY }}
          BUILDD_ADMIN_API_KEY: ${{ secrets.BUILDD_ADMIN_API_KEY }}
          LOCAL_UI_URL: http://100.82.109.19:8767
          SKIP_LOCAL_UI_START: "1"
          # Scope E2E tests based on what changed:
          #   api only    → run API tests (fast, no runner needed)
          #   runner only → run all (worker tests need API too)
          #   both        → run all
          E2E_SCOPE: ${{ needs.changes.outputs.runner == 'true' && 'all' || 'api' }}

      - name: Cleanup
        if: always()
        run: |
          tailscale ssh ubuntu@100.82.109.19 'docker exec coder-ai-run-my-claude-workspace bash -c "
            screen -X -S buildd-web quit 2>/dev/null
            screen -X -S buildd-test quit 2>/dev/null
            (chmod -R u+rwx /tmp/buildd-ci 2>/dev/null || true) && rm -rf /tmp/buildd-ci
          "' || true

      - name: Cleanup Neon branch
        if: always()
        run: |
          BRANCH_ID="${{ steps.neon.outputs.branch_id }}"
          [ -z "$BRANCH_ID" ] && exit 0
          curl -sf -X DELETE \
            -H "Authorization: Bearer $NEON_API_KEY" \
            "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches/$BRANCH_ID" || true
          echo "Deleted Neon branch: $BRANCH_ID"
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
