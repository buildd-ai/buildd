name: Build & Test

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install

      - name: Check migrations are up to date
        run: |
          cd packages/core
          bun db:generate
          if [ -n "$(git status --porcelain drizzle/)" ]; then
            echo "::error::Schema changes detected but migrations not committed!"
            echo "Run 'cd packages/core && bun db:generate' and commit the generated files."
            git status drizzle/
            git diff drizzle/
            exit 1
          fi
          echo "Migrations are up to date"

      - name: Type check
        run: cd apps/web && bunx tsc --noEmit

      - name: Detect affected tests
        id: affected
        run: |
          AFFECTED=$(bash scripts/affected-tests.sh)
          echo "tests=$AFFECTED" >> "$GITHUB_OUTPUT"

      - name: Run tests
        if: steps.affected.outputs.tests != 'SKIP'
        run: |
          TESTS="${{ steps.affected.outputs.tests }}"
          if [ "$TESTS" = "ALL" ]; then
            echo "Running all tests..."
            bun test apps/web/src apps/runner/__tests__/unit
          else
            echo "Running affected tests: $TESTS"
            bun test $TESTS
          fi

      - name: Build
        run: cd apps/web && bun run build:only
        env:
          # Dummy values for build (not connecting to real DB)
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          AUTH_SECRET: "dummy-secret-for-build"

  integration:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install

      - name: Create Neon preview branch
        id: neon
        run: |
          BRANCH_NAME="ci/pr-${{ github.event.pull_request.number }}"

          # Check if branch already exists
          EXISTING=$(curl -sf \
            -H "Authorization: Bearer $NEON_API_KEY" \
            "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches" \
            | jq -r --arg name "$BRANCH_NAME" '.branches[] | select(.name == $name) | .id')

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "Reusing existing Neon branch: $EXISTING"
            BRANCH_ID="$EXISTING"
          else
            echo "Creating Neon branch: $BRANCH_NAME"
            RESPONSE=$(curl -s -X POST \
              -H "Authorization: Bearer $NEON_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"branch\": {\"name\": \"$BRANCH_NAME\", \"parent_id\": \"$NEON_PARENT_BRANCH_ID\"}, \"endpoints\": [{\"type\": \"read_write\"}]}" \
              "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches")
            BRANCH_ID=$(echo "$RESPONSE" | jq -r '.branch.id')
            if [ "$BRANCH_ID" = "null" ] || [ -z "$BRANCH_ID" ]; then
              echo "::error::Failed to create Neon branch"
              echo "$RESPONSE" | jq .
              exit 1
            fi
          fi

          ENDPOINTS=$(curl -sf \
            -H "Authorization: Bearer $NEON_API_KEY" \
            "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches/$BRANCH_ID/endpoints")
          HOST=$(echo "$ENDPOINTS" | jq -r '.endpoints[0].host')

          echo "branch_id=$BRANCH_ID" >> "$GITHUB_OUTPUT"
          echo "database_url=postgresql://${NEON_DB_USER}:${NEON_DB_PASSWORD}@${HOST}/neondb?sslmode=require" >> "$GITHUB_OUTPUT"
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          NEON_PARENT_BRANCH_ID: ${{ secrets.NEON_PARENT_BRANCH_ID }}
          NEON_DB_USER: ${{ secrets.NEON_DB_USER }}
          NEON_DB_PASSWORD: ${{ secrets.NEON_DB_PASSWORD }}

      - name: Set Vercel preview env vars
        id: vercel-env
        run: |
          AUTH="Authorization: Bearer $VERCEL_TOKEN"
          API="https://api.vercel.com"

          # Helper: delete existing env var by key for preview target, then create new one
          set_env() {
            local KEY="$1" VALUE="$2"

            # Find and delete existing preview env var for this key
            EXISTING=$(curl -s -H "$AUTH" "$API/v9/projects/$VERCEL_PROJECT_ID/env" \
              | jq -r --arg k "$KEY" '.envs[] | select(.key == $k and (.target | index("preview"))) | .id')
            for ID in $EXISTING; do
              echo "Deleting existing $KEY ($ID)"
              curl -s -X DELETE -H "$AUTH" "$API/v9/projects/$VERCEL_PROJECT_ID/env/$ID"
            done

            # Create new env var for preview
            PAYLOAD=$(mktemp)
            jq -n --arg k "$KEY" --arg v "$VALUE" '{key:$k,value:$v,type:"encrypted",target:["preview"]}' > "$PAYLOAD"
            RESP=$(curl -s -w "\n%{http_code}" -X POST \
              -H "$AUTH" -H "Content-Type: application/json" \
              -d @"$PAYLOAD" \
              "$API/v10/projects/$VERCEL_PROJECT_ID/env")
            rm -f "$PAYLOAD"
            HTTP=$(echo "$RESP" | tail -1)
            BODY=$(echo "$RESP" | sed '$d')
            if [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ]; then
              echo "Set $KEY for preview (HTTP $HTTP)"
            else
              echo "::error::Failed to set $KEY (HTTP $HTTP): $BODY"
              exit 1
            fi
          }

          set_env "DATABASE_URL" "$DATABASE_URL"
          set_env "AUTH_SECRET" "$AUTH_SECRET"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          DATABASE_URL: ${{ steps.neon.outputs.database_url }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}

      - name: Deploy preview to Vercel
        id: vercel-deploy
        run: |
          npm i -g vercel@latest

          DEPLOY_URL=$(vercel deploy --token=${{ secrets.VERCEL_TOKEN }} --yes \
            --force 2>&1 | grep -oE 'https://[^ ]+\.vercel\.app' | head -1)

          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $DEPLOY_URL"
          for i in $(seq 1 30); do
            BODY=$(curl -s "$DEPLOY_URL/api/version" 2>/dev/null || echo "")
            if echo "$BODY" | jq -e . >/dev/null 2>&1; then
              echo "Deployment ready: $BODY"
              break
            fi
            echo "Waiting for deployment... (attempt $i)"
            sleep 10
          done
          # Final check
          FINAL=$(curl -s "$DEPLOY_URL/api/version" 2>/dev/null || echo "")
          if ! echo "$FINAL" | jq -e . >/dev/null 2>&1; then
            echo "::error::Deployment never became ready. Last response: $(echo "$FINAL" | head -5)"
            exit 1
          fi
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Sync branch code to test machine
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          tailscale ssh ubuntu@100.82.109.19 << SCRIPT
            docker exec coder-ai-run-my-claude-workspace bash -c "
              export PATH=/home/coder/.local/bin:/home/coder/.bun/bin:\\\$PATH
              rm -rf /tmp/buildd-ci
              git clone --depth 1 --branch $BRANCH https://github.com/${{ github.repository }}.git /tmp/buildd-ci
              cd /tmp/buildd-ci && bun install 2>&1 | tail -3
            "
          SCRIPT

      - name: Start preview runner
        run: |
          DEPLOY_URL="${{ steps.vercel-deploy.outputs.url }}"
          tailscale ssh ubuntu@100.82.109.19 << SCRIPT
            docker exec coder-ai-run-my-claude-workspace bash -c "
              export PATH=\\\$HOME/.local/bin:\\\$HOME/.bun/bin:\\\$PATH
              screen -X -S buildd-test quit 2>/dev/null || true
              screen -dmS buildd-test bash -c '
                export PATH=\\\$HOME/.local/bin:\\\$HOME/.bun/bin:\\\$PATH
                export PORT=8767
                export BUILDD_API_KEY=$BUILDD_API_KEY
                export BUILDD_SERVER=$DEPLOY_URL
                cd /tmp/buildd-ci && bun run apps/runner/src/index.ts >> /tmp/buildd-test.log 2>&1
              '
            "
          SCRIPT
          sleep 5
        env:
          BUILDD_API_KEY: ${{ secrets.BUILDD_API_KEY }}

      - name: Integration tests
        run: |
          bun test apps/web/tests/integration/concurrency.test.ts \
               apps/web/tests/integration/worker-state-machine.test.ts \
               apps/web/tests/integration/schedule-triggers.test.ts \
               apps/web/tests/integration/artifacts.test.ts \
               apps/web/tests/integration/recipes.test.ts \
               apps/runner/__tests__/integration-config.test.ts
        env:
          BUILDD_TEST_SERVER: ${{ steps.vercel-deploy.outputs.url }}
          BUILDD_API_KEY: ${{ secrets.BUILDD_API_KEY }}
          BUILDD_ADMIN_API_KEY: ${{ secrets.BUILDD_ADMIN_API_KEY }}
          LOCAL_UI_URL: http://100.82.109.19:8767

      - name: E2E dogfood tests
        run: bun test tests/e2e/server-worker-flow.test.ts
        timeout-minutes: 10
        env:
          BUILDD_TEST_SERVER: ${{ steps.vercel-deploy.outputs.url }}
          BUILDD_API_KEY: ${{ secrets.BUILDD_API_KEY }}
          LOCAL_UI_URL: http://100.82.109.19:8767
          SKIP_LOCAL_UI_START: "1"

      - name: Cleanup preview runner
        if: always()
        run: |
          tailscale ssh ubuntu@100.82.109.19 'docker exec coder-ai-run-my-claude-workspace bash -c "screen -X -S buildd-test quit 2>/dev/null; rm -rf /tmp/buildd-ci"' || true

      - name: Cleanup Neon branch
        if: always()
        run: |
          BRANCH_ID="${{ steps.neon.outputs.branch_id }}"
          [ -z "$BRANCH_ID" ] && exit 0
          curl -sf -X DELETE \
            -H "Authorization: Bearer $NEON_API_KEY" \
            "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches/$BRANCH_ID" || true
          echo "Deleted Neon branch: $BRANCH_ID"
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
