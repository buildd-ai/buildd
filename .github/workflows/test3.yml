name: Test With Secrets
on:
  workflow_dispatch:
    inputs:
      env_key:
        description: 'Env var name'
        required: true
        default: 'BUILDD_SIGNING_KEY_TEAM_ID'
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      ENV_KEY: ${{ github.event.inputs.env_key }}
    steps:
      - run: echo "key=$ENV_KEY project=$VERCEL_PROJECT_ID"
