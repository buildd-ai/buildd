name: Visual QA

# Runs ONLY on release PRs (dev→main). Stands the app up ephemerally on the
# runner (bun dev + Neon prod-clone branch, PII-scrubbed), captures Playwright
# screenshots and a11y snapshots per route, judges via the buildd /api/qa/judge
# endpoint (server-side Claude — NO ANTHROPIC_API_KEY in CI secrets), then posts
# results as a PR comment + a report-only (neutral) check run. Never blocks merge.
#
# Neon branch: copy-on-write off NEON_PROD_PARENT_BRANCH_ID → PII scrubbed → auto-deleted.
# Judge: BUILDD_QA_KEY (bld_xxx) → POST /api/qa/judge → server calls Anthropic.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: visual-qa-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write
  statuses: write

jobs:
  visual-qa:
    name: Visual QA — spec-driven page audit
    runs-on: ubuntu-latest
    # Release PRs are dev→main only. Hotfix PRs (feature→main) bypass this.
    if: github.head_ref == 'dev' || github.event_name == 'workflow_dispatch'

    env:
      QA_OUTPUT: /tmp/qa
      QA_BASE_URL: http://localhost:3000
      QA_MANIFEST: apps/web/src/qa/visual-qa-routes.json

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install

      - name: Install Playwright + Chromium
        run: bunx playwright install chromium --with-deps

      # --- Ephemeral Neon branch cloned off PROD ---
      # Copy-on-write off the production branch so the app sees real-shaped data.
      # The branch is auto-deleted in the "Cleanup Neon branch" step (always runs).
      # Never log connection URIs or row contents.
      - name: Create Neon prod-clone branch
        id: neon
        run: |
          BRANCH_NAME="ci/visual-qa-pr-${{ github.event.pull_request.number || github.run_number }}"

          EXISTING=$(curl -sf \
            -H "Authorization: Bearer $NEON_API_KEY" \
            "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches" \
            | jq -r --arg n "$BRANCH_NAME" '.branches[] | select(.name == $n) | .id')

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "Deleting stale Neon branch: $EXISTING"
            curl -sf -X DELETE \
              -H "Authorization: Bearer $NEON_API_KEY" \
              "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches/$EXISTING" || true
            sleep 2
          fi

          # Clone off PROD branch (copy-on-write — no data is moved or duplicated).
          # Falls back to NEON_PARENT_BRANCH_ID if NEON_PROD_PARENT_BRANCH_ID is not yet configured.
          PARENT_BRANCH_ID="${NEON_PROD_PARENT_BRANCH_ID:-$NEON_PARENT_BRANCH_ID}"
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $NEON_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"branch\":{\"name\":\"$BRANCH_NAME\",\"parent_id\":\"$PARENT_BRANCH_ID\"},\"endpoints\":[{\"type\":\"read_write\"}]}" \
            "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches")

          BRANCH_ID=$(echo "$RESPONSE" | jq -r '.branch.id')
          if [ -z "$BRANCH_ID" ] || [ "$BRANCH_ID" = "null" ]; then
            echo "::error::Failed to create Neon branch: $(echo "$RESPONSE" | jq -c .)"
            exit 1
          fi

          CONNECTION_URI=$(echo "$RESPONSE" | jq -r '.connection_uris[0].connection_uri // empty')
          if [ -z "$CONNECTION_URI" ]; then
            ENDPOINT_ID=$(echo "$RESPONSE" | jq -r '.endpoints[0].id // empty')
            if [ -n "$ENDPOINT_ID" ]; then
              CONN_RESPONSE=$(curl -sf \
                -H "Authorization: Bearer $NEON_API_KEY" \
                "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/connection_uri?branch_id=$BRANCH_ID&endpoint_id=$ENDPOINT_ID&database_name=neondb")
              CONNECTION_URI=$(echo "$CONN_RESPONSE" | jq -r '.uri // empty')
            fi
          fi

          if [ -z "$CONNECTION_URI" ]; then
            ENDPOINTS=$(curl -sf \
              -H "Authorization: Bearer $NEON_API_KEY" \
              "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches/$BRANCH_ID/endpoints")
            HOST=$(echo "$ENDPOINTS" | jq -r '.endpoints[0].host')
            CONNECTION_URI="postgresql://${NEON_DB_USER}:${NEON_DB_PASSWORD}@${HOST}/neondb?sslmode=require"
          fi

          [[ "$CONNECTION_URI" != *"sslmode=require"* ]] && \
            CONNECTION_URI="${CONNECTION_URI}$(echo "$CONNECTION_URI" | grep -q '?' && echo '&' || echo '?')sslmode=require"

          echo "branch_id=$BRANCH_ID" >> "$GITHUB_OUTPUT"
          # Do NOT echo the connection URI — it contains credentials
          echo "database_url=$CONNECTION_URI" >> "$GITHUB_OUTPUT"
          echo "::notice::Neon branch $BRANCH_NAME ($BRANCH_ID) created from prod"
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          NEON_PROD_PARENT_BRANCH_ID: ${{ secrets.NEON_PROD_PARENT_BRANCH_ID }}
          NEON_PARENT_BRANCH_ID: ${{ secrets.NEON_PARENT_BRANCH_ID }}
          NEON_DB_USER: ${{ secrets.NEON_DB_USER }}
          NEON_DB_PASSWORD: ${{ secrets.NEON_DB_PASSWORD }}

      - name: Run migrations
        # On a true prod clone the migration journal is current and bun db:migrate
        # is a no-op. When using the fallback NEON_PARENT_BRANCH_ID (dev/test branch),
        # the journal may be out of sync with direct schema changes; we treat "already
        # exists" errors as success because the schema is already correct.
        run: |
          OUTPUT=$(cd packages/core && bun db:migrate 2>&1) && echo "$OUTPUT" || {
            if echo "$OUTPUT" | grep -q "already exists"; then
              echo "::warning::Migration warning (schema already applied): ${OUTPUT##*Migration failed: }"
              echo "$OUTPUT"
            else
              echo "$OUTPUT"
              exit 1
            fi
          }
        env:
          DATABASE_URL: ${{ steps.neon.outputs.database_url }}

      # --- PII scrub (required before app starts, before any data is rendered) ---
      # Anonymizes user emails + names in-place on the cloned branch.
      # Designates one team owner as the CI QA user (ci-qa@buildd.dev) so the
      # app shows real workspace data when started with DEV_USER_EMAIL.
      # Clears all secrets and device_codes — these must never leave prod.
      # Row IDs and foreign keys are preserved; only PII text fields are changed.
      - name: Scrub PII from prod clone
        id: scrub
        run: |
          psql "$DATABASE_URL" <<'EOSQL'
            -- Designate one workspace owner as the CI QA user (must run BEFORE general scrub)
            UPDATE users
            SET email = 'ci-qa@buildd.dev', name = 'CI QA User'
            WHERE id = (
              SELECT u.id
              FROM users u
              JOIN team_members tm ON tm.user_id = u.id
              WHERE tm.role = 'owner'
              ORDER BY u.created_at
              LIMIT 1
            );

            -- Anonymize all remaining users
            UPDATE users
            SET
              email = 'user-' || REPLACE(id::text, '-', '') || '@scrubbed.local',
              name  = 'User ' || LEFT(id::text, 8),
              image = NULL
            WHERE email != 'ci-qa@buildd.dev';

            -- Anonymize team invitations
            UPDATE team_invitations
            SET email = 'invite-' || REPLACE(id::text, '-', '') || '@scrubbed.local';

            -- Wipe all encrypted secrets and device auth codes
            DELETE FROM secrets;
            DELETE FROM device_codes;
          EOSQL
          echo "ci_user_email=ci-qa@buildd.dev" >> "$GITHUB_OUTPUT"
          echo "::notice::PII scrub complete — prod clone is now anonymized"
        env:
          DATABASE_URL: ${{ steps.neon.outputs.database_url }}
          PGPASSWORD: ""

      # --- Start app in dev mode (CI-seeded auth) ---
      # NODE_ENV=development enables the `dev-auto-login` credentials provider in
      # apps/web/src/auth.ts so Playwright can get a session without OAuth.
      # DEV_USER_EMAIL points to the CI QA user we designated in the scrub step,
      # so getCurrentUser() resolves to their real workspace data (stale from prod).
      - name: Start app
        run: |
          cd apps/web
          bun dev > /tmp/app.log 2>&1 &
          echo $! > /tmp/app.pid
          echo "Waiting for app to be ready..."
          for i in $(seq 1 24); do
            sleep 5
            if curl -sf http://localhost:3000/api/version >/dev/null 2>&1; then
              echo "App ready after $((i * 5))s"
              break
            fi
            if [ "$i" -eq 24 ]; then
              echo "::error::App failed to start after 120s"
              tail -50 /tmp/app.log || true
              exit 1
            fi
          done
        env:
          DATABASE_URL: ${{ steps.neon.outputs.database_url }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          NEXTAUTH_URL: http://localhost:3000
          DEV_USER_EMAIL: ${{ steps.scrub.outputs.ci_user_email }}
          # Placeholder OAuth credentials — only dev-auto-login is used in CI
          GOOGLE_CLIENT_ID: ci-placeholder
          GOOGLE_CLIENT_SECRET: ci-placeholder
          GITHUB_APP_CLIENT_ID: ci-placeholder
          GITHUB_APP_CLIENT_SECRET: ci-placeholder
          # Prevent the app from writing back to the prod-shaped ephemeral branch
          DISABLE_WRITES: "true"

      # --- Playwright capture ---
      - name: Capture screenshots and a11y snapshots
        continue-on-error: true
        run: bun scripts/qa/capture.ts
        env:
          QA_BASE_URL: ${{ env.QA_BASE_URL }}
          QA_OUTPUT: ${{ env.QA_OUTPUT }}
          QA_MANIFEST: ${{ env.QA_MANIFEST }}

      # --- Judge via buildd (server-side Claude — no ANTHROPIC_API_KEY in CI) ---
      # CI posts each capture to POST /api/qa/judge on the buildd server.
      # The buildd server calls Anthropic using its own credentials.
      # Only BUILDD_QA_KEY (a bld_xxx API key) is needed in GitHub secrets.
      - name: Judge pages (via buildd)
        continue-on-error: true
        run: bun scripts/qa/judge.ts
        env:
          BUILDD_QA_URL: https://buildd.dev
          # BUILDD_QA_KEY: dedicated read-only key scoped to /api/qa/judge.
          # Falls back to BUILDD_API_KEY (workspace key already in secrets) until
          # a scoped key is provisioned.
          BUILDD_QA_KEY: ${{ secrets.BUILDD_QA_KEY || secrets.BUILDD_API_KEY }}
          QA_OUTPUT: ${{ env.QA_OUTPUT }}
          QA_MANIFEST: ${{ env.QA_MANIFEST }}

      # --- Upload screenshots as workflow artifacts ---
      - name: Upload screenshots
        id: screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-qa-screenshots-pr${{ github.event.pull_request.number || github.run_number }}-run${{ github.run_number }}
          path: /tmp/qa/screenshots/
          retention-days: 30
          if-no-files-found: warn

      # --- Post PR comment + create report-only check run ---
      - name: Post results
        if: always()
        uses: actions/github-script@v7
        env:
          QA_OUTPUT: /tmp/qa
          SCREENSHOTS_URL: ${{ steps.screenshots.outputs.artifact-url }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const outputDir = process.env.QA_OUTPUT;

            const reportPath = path.join(outputDir, 'report.md');
            const verdictsPath = path.join(outputDir, 'verdicts.json');
            const screenshotsUrl = process.env.SCREENSHOTS_URL || '';

            const hasReport = fs.existsSync(reportPath);
            const hasVerdicts = fs.existsSync(verdictsPath);

            let report = hasReport ? fs.readFileSync(reportPath, 'utf8') : '_No QA report generated._';
            let verdicts = hasVerdicts ? JSON.parse(fs.readFileSync(verdictsPath, 'utf8')) : [];

            const pass = verdicts.filter(v => v.overallVerdict === 'PASS').length;
            const fail = verdicts.filter(v => ['FAIL', 'ERROR'].includes(v.overallVerdict)).length;
            const total = verdicts.length;
            const overallStatus = fail > 0 ? '❌ Findings' : (total > 0 ? '✅ All clear' : '⚪ No data');

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const commentBody = [
              `## 🔍 Visual QA — ${overallStatus}`,
              screenshotsUrl ? `[📸 Download screenshots](${screenshotsUrl})` : '',
              '',
              report,
              '',
              `<sub>Workflow run [#${context.runNumber}](${runUrl}) · \`scripts/qa/\`</sub>`,
            ].filter(line => line !== undefined).join('\n');

            // Post updated comment (skip on workflow_dispatch with no PR)
            if (context.issue?.number) {
              // Delete previous visual-qa bot comments
              const { data: existingComments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });
              for (const c of existingComments) {
                if (c.user?.type === 'Bot' && c.body?.includes('🔍 Visual QA')) {
                  await github.rest.issues.deleteComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    comment_id: c.id,
                  }).catch(() => {});
                }
              }
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody,
              });
            }

            // Report-only check run — conclusion is always 'neutral' (never blocks merge)
            const headSha = context.payload.pull_request?.head?.sha || context.sha;
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Visual QA',
              head_sha: headSha,
              status: 'completed',
              conclusion: 'neutral',
              output: {
                title: `Visual QA: ${overallStatus} (${pass}/${total} pages clear)`,
                summary: report.substring(0, 65535),
              },
            });

            core.notice(`Visual QA posted: ${overallStatus} — ${pass}/${total} pages`);

      # --- Cleanup ---
      - name: Stop app
        if: always()
        run: |
          if [ -f /tmp/app.pid ]; then
            kill "$(cat /tmp/app.pid)" 2>/dev/null || true
          fi

      - name: Dump app log on failure
        if: failure()
        run: tail -100 /tmp/app.log 2>/dev/null || echo '(no app log)'

      # The Neon prod-clone branch is always deleted — success or failure.
      # This is the only write-back to Neon: branch deletion. No prod data is modified.
      - name: Cleanup Neon branch
        if: always()
        run: |
          BRANCH_ID="${{ steps.neon.outputs.branch_id }}"
          [ -z "$BRANCH_ID" ] && exit 0
          curl -sf -X DELETE \
            -H "Authorization: Bearer $NEON_API_KEY" \
            "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches/$BRANCH_ID" || true
          echo "Deleted Neon branch: $BRANCH_ID"
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
