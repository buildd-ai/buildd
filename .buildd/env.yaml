# Environment contract for buildd — consumed by `buildd env verify`.
# See docs/design/reliable-env-provisioning.md. Proves the repo is runnable
# before an agent (or CI, or a human on a fresh clone) starts work on it.
toolchain:
  runtime: bun          # any bun on PATH; the lockfile pins package versions
install:
  command: bun install --frozen-lockfile
readiness:
  # Cheap, meaningful proof the tree is coherent: spec contracts + index in sync.
  command: bun run scripts/check-specs.ts --check
  timeout: 120
provision:
  # Per-clone git config (can't be committed) — registers the spec-lint pre-commit hook.
  - git config core.hooksPath .githooks
# env.required is intentionally omitted until secret injection lands (Phase 4);
# requiring DATABASE_URL here would fail a fresh human clone that has no secrets.
